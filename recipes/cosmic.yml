---
name: cosmic
description: cosmic-atomic-main with modifications.
    
base-image: ghcr.io/ublue-os/cosmic-atomic-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - from-file: ../modules/packages.yml
    source: local
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-%OS_VERSION%/yalter-niri-fedora-%OS_VERSION%.repo
    install:
      - dash
      - waydroid
      - gdisk
      - btrfs-progs
      - niri
      - gamescope

  - from-file: ../modules/flatpaks.yml
    source: local  
  - type: default-flatpaks
    notify: true
    system:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      repo-title: "Flathub (system-wide)"
      install:
        - dev.edfloreshz.CosmicTweaks

  - type: signing
